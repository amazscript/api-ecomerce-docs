<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Main terminal window -->
  <g filter="url(#shadow1)">
    <rect x="50" y="40" width="400" height="300" rx="16" fill="url(#card-bg)"/>
    <!-- Title bar -->
    <rect x="50" y="40" width="400" height="36" rx="16" fill="#1a2332"/>
    <rect x="50" y="60" width="400" height="16" fill="#1a2332"/>
    <!-- Traffic lights -->
    <circle cx="78" cy="58" r="6" fill="#ef4444"/>
    <circle cx="98" cy="58" r="6" fill="#f59e0b"/>
    <circle cx="118" cy="58" r="6" fill="#22c55e"/>
    <text x="250" y="63" font-family="SF Mono, monospace" font-size="11" fill="#64748b" text-anchor="middle">LaraCommerce API</text>

    <!-- Code lines -->
    <text x="80" y="105" font-family="SF Mono, Fira Code, monospace" font-size="13" fill="#8b5cf6">$</text>
    <text x="95" y="105" font-family="SF Mono, Fira Code, monospace" font-size="13" fill="#e2e8f0">docker compose up -d</text>

    <text x="80" y="132" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#22c55e">  ✔ mysql</text>
    <text x="170" y="132" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#22c55e">✔ redis</text>
    <text x="250" y="132" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#22c55e">✔ meilisearch</text>

    <text x="80" y="156" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#22c55e">  ✔ minio</text>
    <text x="170" y="156" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#22c55e">✔ nginx</text>
    <text x="250" y="156" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#22c55e">✔ horizon</text>

    <text x="80" y="190" font-family="SF Mono, Fira Code, monospace" font-size="13" fill="#8b5cf6">$</text>
    <text x="95" y="190" font-family="SF Mono, Fira Code, monospace" font-size="13" fill="#e2e8f0">php artisan test</text>

    <text x="80" y="220" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#22c55e">  PASS</text>
    <text x="130" y="220" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#94a3b8">Tests: 2,443 passed (4,783 assertions) 100%</text>

    <text x="80" y="250" font-family="SF Mono, Fira Code, monospace" font-size="13" fill="#8b5cf6">$</text>
    <text x="95" y="250" font-family="SF Mono, Fira Code, monospace" font-size="13" fill="#e2e8f0">curl /api/v1/products</text>

    <text x="80" y="278" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#f59e0b">  {"status":"success","data":[...]}</text>
  </g>

  <!-- Floating badges -->
  <!-- Stripe -->
  <g filter="url(#shadow2)">
    <rect x="30" y="360" width="100" height="36" rx="18" fill="#635bff"/>
    <text x="80" y="383" font-family="Inter, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Stripe</text>
  </g>

  <!-- Laravel -->
  <g filter="url(#shadow2)">
    <rect x="145" y="360" width="100" height="36" rx="18" fill="url(#grad2)"/>
    <text x="195" y="383" font-family="Inter, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Laravel 12</text>
  </g>

  <!-- Docker -->
  <g filter="url(#shadow2)">
    <rect x="260" y="360" width="90" height="36" rx="18" fill="#2496ed"/>
    <text x="305" y="383" font-family="Inter, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Docker</text>
  </g>

  <!-- Filament -->
  <g filter="url(#shadow2)">
    <rect x="365" y="360" width="100" height="36" rx="18" fill="#f59e0b"/>
    <text x="415" y="383" font-family="Inter, sans-serif" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">Filament</text>
  </g>

  <!-- Stats row -->
  <g filter="url(#shadow2)">
    <rect x="50" y="420" width="130" height="50" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="115" y="443" font-family="Inter, sans-serif" font-size="18" fill="url(#grad1)" text-anchor="middle" font-weight="800">325+</text>
    <text x="115" y="460" font-family="Inter, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Endpoints</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="195" y="420" width="130" height="50" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="260" y="443" font-family="Inter, sans-serif" font-size="18" fill="url(#grad2)" text-anchor="middle" font-weight="800">2,443</text>
    <text x="260" y="460" font-family="Inter, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Tests (100%)</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="340" y="420" width="130" height="50" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="405" y="443" font-family="Inter, sans-serif" font-size="18" fill="#22c55e" text-anchor="middle" font-weight="800">46</text>
    <text x="405" y="460" font-family="Inter, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Admin Screens</text>
  </g>
</svg>
